name: Deploy Staging GitHub Pages

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_USE_MOCK: 'false'
          VITE_BASE: /admin-web/
          VITE_API_BASE_URL: https://staging.admin.varo.cloud/api
          VITE_USER_API_BASE_URL: https://staging.api.varo.cloud/api
        run: npm run build

      - name: Setup SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to varo-staging/admin-web
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.STAGING_DEPLOY_TOKEN }}
          external_repository: varo-staging/admin-web
          publish_branch: gh-pages
          publish_dir: ./dist
